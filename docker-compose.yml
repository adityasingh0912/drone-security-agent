version: "3.9"

services:
  drone-agent:
    build: .
    container_name: drone-security-agent
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DB_PATH=/app/data/drone_security.db
      - RULES_PATH=/app/simdata/alert_rules.yaml
      - TELEMETRY_PATH=/app/simdata/telemetry.json
      - FRAMES_PATH=/app/simdata/frames.json
    volumes:
      - ./data:/app/data
    restart: unless-stopped
